<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Report an Issue | CivicLens</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-tint": "#0053db",
                        "surface-container-highest": "#e5e1e4",
                        "background": "#fcf8fb",
                        "inverse-on-surface": "#f3f0f2",
                        "secondary-container": "#e3e1ec",
                        "tertiary-container": "#bc4800",
                        "outline": "#737686",
                        "on-primary-fixed-variant": "#003ea8",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "on-tertiary-fixed": "#360f00",
                        "on-secondary-fixed-variant": "#46464e",
                        "on-error-container": "#93000a",
                        "surface-variant": "#e5e1e4",
                        "tertiary-fixed-dim": "#ffb596",
                        "outline-variant": "#c3c6d7",
                        "surface-container": "#f0edf0",
                        "surface-dim": "#dcd9dc",
                        "tertiary-fixed": "#ffdbcd",
                        "on-tertiary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-background": "#1c1b1d",
                        "primary-fixed-dim": "#b4c5ff",
                        "surface-bright": "#fcf8fb",
                        "surface-container-low": "#f6f2f5",
                        "on-primary": "#ffffff",
                        "on-secondary-container": "#63646c",
                        "error-container": "#ffdad6",
                        "primary-fixed": "#dbe1ff",
                        "secondary": "#5d5e66",
                        "on-surface-variant": "#434655",
                        "on-tertiary-container": "#ffede6",
                        "on-primary-container": "#eeefff",
                        "on-surface": "#1c1b1d",
                        "surface": "#fcf8fb",
                        "primary": "#004ac6",
                        "error": "#ba1a1a",
                        "on-secondary-fixed": "#1a1b22",
                        "primary-container": "#2563eb",
                        "tertiary": "#943700",
                        "on-primary-fixed": "#00174b",
                        "surface-container-high": "#eae7ea",
                        "inverse-surface": "#313032",
                        "inverse-primary": "#b4c5ff",
                        "secondary-fixed-dim": "#c6c5cf",
                        "on-error": "#ffffff",
                        "secondary-fixed": "#e3e1ec",
                        "on-secondary": "#ffffff"
                    },
                    fontFamily: {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased">
<!-- TopAppBar Navigation Shell -->
<header class="bg-white dark:bg-zinc-950 border-b border-zinc-200/60 dark:border-zinc-800/60 fixed top-0 left-0 w-full z-50 transition-colors">
<div class="flex items-center justify-between px-4 h-16 w-full max-w-7xl mx-auto">
<button class="flex items-center justify-center p-2 rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-900 transition-colors active:scale-95 duration-150 text-zinc-500 dark:text-zinc-400">
<span class="material-symbols-outlined">chevron_left</span>
</button>
<h1 class="font-['Inter'] tracking-tight font-semibold text-lg text-zinc-900 dark:text-zinc-100">Report an Issue</h1>
<div class="w-10"></div> <!-- Visual Balancer -->
</div>
</header>
<main class="pt-20 pb-32 px-4 max-w-lg mx-auto space-y-8">
<!-- Step 1: Visual Documentation -->
<section class="space-y-3">
<div class="flex items-center justify-between">
<span class="text-[10px] font-mono uppercase tracking-widest text-outline">Section 01</span>
<span class="text-[10px] font-mono text-primary">Required</span>
</div>
<div class="relative group">
<div class="w-full aspect-video rounded-xl border-2 border-dashed border-outline-variant bg-surface-container-lowest flex flex-col items-center justify-center space-y-3 cursor-pointer hover:border-primary transition-colors group-active:scale-[0.99] duration-200">
<div class="w-12 h-12 rounded-full bg-primary-fixed flex items-center justify-center text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
</div>
<p class="text-sm font-medium text-on-surface-variant">Tap to upload image of the issue</p>
<p class="text-xs text-outline">Supported: JPG, PNG, HEIC</p>
</div>
</div>
</section>
<!-- Step 2: Geo-Contextual Data -->
<section class="space-y-3">
<div class="flex items-center justify-between">
<span class="text-[10px] font-mono uppercase tracking-widest text-outline">Section 02</span>
<span class="text-[10px] font-mono text-primary">Automatic</span>
</div>
<div class="overflow-hidden rounded-xl bg-surface-container-lowest border border-outline-variant shadow-sm">
<!-- Map Placeholder -->
<div class="relative h-40 w-full bg-surface-container">
<img alt="Map view of Connaught Place, New Delhi" class="w-full h-full object-cover grayscale-[0.2] contrast-[1.1]" data-alt="Satellite map view of urban grid city layout with a central circular park and surrounding radial roads in daylight" data-location="Connaught Place, Delhi" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBho5sf_sINqXpIWVM6icFOzdarKbS95DiBT6Nz5ozTOf2gCyN0GttF4mQqhUwFXKNE_M8DgyVUWLt7XansH4B0xXsGEJJEvWAAHlv1RPaiG0qI1iAG15PbnO2xo1HnFAOKNOrU6z15d35aXNceB-DKuZ53YBURh_5g9SyuI24wkWQaZFeml4jabfDrMyXOPsSBnB7eBi3IDWDP7PkiYSxG-ZOPy_OpS_uwu36YtjSW4Z4gbf7UL8QuRofFX64QHsvWkVjDgJ-QOdLR"/>
<div class="absolute inset-0 flex items-center justify-center">
<div class="relative">
<span class="material-symbols-outlined text-error text-4xl" style="font-variation-settings: 'FILL' 1;">location_on</span>
<div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-2 h-1 bg-black/20 rounded-full blur-[1px]"></div>
</div>
</div>
</div>
<!-- Location Info -->
<div class="p-4 flex flex-col md:flex-row md:items-center justify-between gap-4">
<div class="space-y-1">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-outline text-sm">my_location</span>
<p class="font-mono text-sm font-medium text-on-surface">28.6328° N, 77.2197° E</p>
</div>
<p class="text-sm text-on-surface-variant font-medium">Connaught Place, New Delhi</p>
</div>
<button class="text-xs font-semibold text-primary py-2 px-4 rounded-lg bg-primary/5 hover:bg-primary/10 transition-colors self-start md:self-center">
                        Adjust Pin
                    </button>
</div>
</div>
</section>
<!-- Step 3: Issue Intelligence -->
<section class="space-y-6">
<div class="flex items-center justify-between">
<span class="text-[10px] font-mono uppercase tracking-widest text-outline">Section 03</span>
<span class="text-[10px] font-mono text-primary">Details</span>
</div>
<div class="bg-surface-container-lowest p-6 rounded-xl border border-outline-variant space-y-6">
<!-- Dropdown -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant">Issue Type</label>
<div class="relative">
<select class="w-full appearance-none bg-surface-container-low border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 text-on-surface py-3 px-0 font-medium transition-all">
<option value="pothole">Pothole / Road Damage</option>
<option value="garbage">Unattended Garbage</option>
<option value="water">Water Leakage</option>
<option value="lights">Street Light Fault</option>
</select>
<span class="material-symbols-outlined absolute right-0 top-1/2 -translate-y-1/2 pointer-events-none text-outline">expand_more</span>
</div>
</div>
<!-- Severity Pill Toggles -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant">Severity Assessment</label>
<div class="grid grid-cols-3 gap-2">
<button class="py-2 px-1 rounded-lg border border-outline-variant bg-surface-container-lowest text-xs font-semibold text-on-surface-variant hover:bg-green-50 hover:border-green-200 hover:text-green-700 transition-all">
                            Low
                        </button>
<button class="py-2 px-1 rounded-lg border-2 border-amber-400 bg-amber-50 text-xs font-bold text-amber-800 shadow-sm">
                            Medium
                        </button>
<button class="py-2 px-1 rounded-lg border border-outline-variant bg-surface-container-lowest text-xs font-semibold text-on-surface-variant hover:bg-red-50 hover:border-red-200 hover:text-red-700 transition-all">
                            High
                        </button>
</div>
</div>
<!-- Title Input -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant">Report Title</label>
<input class="w-full bg-surface-container-low border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 text-on-surface py-3 px-0 font-medium placeholder:text-outline-variant transition-all" placeholder="e.g., Massive crater near Metro Gate 3" type="text"/>
</div>
<!-- Description Area -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant">Detailed Observations</label>
<textarea class="w-full bg-surface-container-low border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 text-on-surface py-3 px-0 font-medium placeholder:text-outline-variant leading-relaxed resize-none transition-all" placeholder="Describe the current situation, any safety hazards, and duration of the issue..." rows="4"></textarea>
</div>
<!-- Smart Suggestions -->
<div class="pt-2 flex flex-wrap gap-2">
<button class="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-tertiary-fixed text-on-tertiary-fixed text-[11px] font-bold hover:brightness-95 transition-all">
<span class="material-symbols-outlined text-xs">tag</span>pothole
                    </button>
<button class="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-secondary-fixed text-on-secondary-fixed text-[11px] font-bold hover:brightness-95 transition-all">
<span class="material-symbols-outlined text-xs">tag</span>urgent
                    </button>
<button class="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-primary-fixed text-on-primary-fixed text-[11px] font-bold hover:brightness-95 transition-all">
<span class="material-symbols-outlined text-xs">tag</span>roadSafety
                    </button>
</div>
</div>
</section>
</main>
<!-- BottomNavBar Submission Anchor -->
<footer class="fixed bottom-0 left-0 w-full z-50 bg-white dark:bg-zinc-950 px-4 pb-10 pt-3 border-t border-zinc-200/60 dark:border-zinc-800/60 shadow-[0_-4px_12px_rgba(0,0,0,0.03)]">
<div class="max-w-lg mx-auto">
<button class="flex items-center justify-center w-full bg-blue-600 dark:bg-blue-700 text-white rounded-lg py-4 px-6 font-bold shadow-sm transition-all hover:bg-blue-700 dark:hover:bg-blue-600 active:scale-[0.98] cursor-pointer">
<span class="material-symbols-outlined mr-2" style="font-variation-settings: 'FILL' 1;">send</span>
                Submit Report
            </button>
<p class="text-[10px] text-center mt-3 text-outline font-medium tracking-tight">
                By submitting, you agree to the <span class="underline">Community Guidelines</span>
</p>
</div>
</footer>
</body></html>
